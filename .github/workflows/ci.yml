name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: ielts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ielts_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      FLASK_ENV: testing
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ielts_test
      JWT_SECRET_KEY: test-secret
      REQUIRE_LOGIN_APPROVAL: "false"
      BACKEND_BASE_URL: http://localhost:5000
      FRONTEND_BASE_URL: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend smoke test
        run: |
          python - <<'PY'
          from app import create_app
          app = create_app('testing')
          client = app.test_client()
          r = client.get('/api/health')
          assert r.status_code == 200, r.data
          print(r.get_json())
          PY
